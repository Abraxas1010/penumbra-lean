name: Lean Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: lake-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}
          restore-keys: lake-

      - name: Build
        working-directory: lean
        run: lake build

      - name: Verify zero sorry
        working-directory: lean
        run: |
          SORRY_COUNT=$(grep -r "sorry\|admit" HeytingLean/ --include="*.lean" | grep -v "^.*:.*--" | wc -l)
          echo "Sorry/admit count: $SORRY_COUNT"
          [ "$SORRY_COUNT" -eq 0 ] || exit 1
